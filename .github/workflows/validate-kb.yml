name: validate-kb

# Mechanical guard for the registry -> schema -> KB consistency rule.
# Runs the validator on every push/PR so the three knowledge files cannot drift.
on:
  push:
    paths:
      - "DB/switching/**"
      - "selector/**"
      - ".github/workflows/validate-kb.yml"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: selector/package-lock.json
      - name: Install validator dev deps (ajv — dev/CI only; runtime stays zero-dep)
        run: npm ci
        working-directory: selector
      - name: Consistency validator (ajv shape + registry/schema/KB + reference integrity)
        run: node selector/tools/validate-kb.mjs
