name: validate-kb

# Mechanical guard for the registry -> schema -> KB consistency rule.
# Runs the validator on every push/PR so the three knowledge files cannot drift.
on:
  push:
    paths:
      - "DB/switching/**"
      - "selector/**"
      - "mcp/**"
      - ".github/workflows/validate-kb.yml"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: selector/package-lock.json
      - name: Install validator dev deps (ajv — dev/CI only; runtime stays zero-dep)
        run: npm ci
        working-directory: selector
      - name: Consistency validator (ajv shape + registry/schema/KB + reference integrity)
        run: node selector/tools/validate-kb.mjs

  # Stage-2 MCP server: a deploy is a KB snapshot, so it only ships from main and
  # only after the validator passed (selector/docs/mcp-solver-contract.md §6).
  # Skips gracefully until the Cloudflare secrets exist:
  #   CLOUDFLARE_API_TOKEN  (API token, "Edit Cloudflare Workers" template)
  #   CLOUDFLARE_ACCOUNT_ID (dash.cloudflare.com -> Workers & Pages -> account id)
  deploy-mcp:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # The `secrets` context cannot appear inside an `if:` conditional (GitHub
    # rejects the whole workflow file at parse time if it does) — thread the
    # secret through a job-level env var instead and gate on that.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Skip notice when Cloudflare secrets are not configured
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN secret not set — skipping deploy."
      - uses: actions/checkout@v4
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
      - uses: actions/setup-node@v4
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - name: Install MCP server deps
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npm ci
        working-directory: mcp
      - name: Deploy Worker (wrangler)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: mcp
